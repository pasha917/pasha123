{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card card-shadow p-4">
      <h2 class="mb-3">Forgot Password</h2>
      <form method="post" action="{{ url_for('forgot_password') }}" class="needs-validation" novalidate>
        <div class="mb-3">
          <label class="form-label">Enter your email</label>
          <input type="email" class="form-control" name="email" required
                 pattern="^[A-Za-z0-9._%+-]+@gmail\.com$"
                 title="Enter a valid Gmail address ending with @gmail.com">
          <div class="invalid-feedback">Please enter a valid Gmail address ending with @gmail.com.</div>
        </div>
        <button class="btn btn-warning w-100">Send reset OTP</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
